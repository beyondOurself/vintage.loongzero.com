<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>首页 - 古着商城</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="../../scrollbar-control.js"></script>`n</head>
<body class="vintage-bg" style="margin:0;padding:0;">
    <!-- 顶部导航 -->
    <header class="bg-white sticky top-0 z-50 safe-top border-b border-[#E8E5E0]">
        <div class="flex items-center justify-between px-4 py-4">
            <h1 class="text-lg font-medium gradient-text tracking-wider">VINTAGE</h1>
            <div class="flex items-center gap-5">
                <i class="fas fa-search text-[#2D1C13] text-lg"></i>
                <i class="fas fa-shopping-bag text-[#2D1C13] text-lg relative">
                    <span class="absolute -top-2 -right-2 vintage-badge w-4 h-4 flex items-center justify-center text-[8px]">2</span>
                </i>
            </div>
        </div>
    </header>
    
    <!-- 搜索栏 -->
    <section class="px-4 py-3 bg-white border-b border-[#E8E5E0]">
        <div class="vintage-input w-full flex items-center">
            <i class="fas fa-search text-[#857C72] mr-2"></i>
            <input type="text" placeholder="搜索商品" class="flex-1 bg-transparent text-[#2D1C13] placeholder-[#857C72] outline-none">
        </div>
    </section>

    <!-- 轮播图 -->
    <section class="relative h-64 overflow-hidden bg-[#351D14]">
        <div class="flex h-full">
            <img src="https://images.unsplash.com/photo-1441986300917-64674bd600d8?w=800&q=80" alt="Banner" class="w-full h-full object-cover flex-shrink-0 opacity-90">
        </div>
        <div class="absolute bottom-4 left-1/2 transform -translate-x-1/2 flex gap-2">
            <div class="w-2 h-2 bg-white rounded-full"></div>
            <div class="w-2 h-2 bg-white/50 rounded-full"></div>
        </div>
    </section>

    <!-- 分类入口 -->
    <section class="bg-white py-6 border-b border-[#E8E5E0]">
        <div class="flex gap-4 px-4 overflow-x-auto scrollbar-hide">
            <button class="px-6 py-2 bg-[#351D14] text-white text-xs font-medium tracking-wider uppercase whitespace-nowrap flex-shrink-0">外套</button>
            <button class="px-6 py-2 bg-white text-[#2D1C13] border border-[#857C72] text-xs font-medium tracking-wider uppercase whitespace-nowrap flex-shrink-0">衬衫</button>
            <button class="px-6 py-2 bg-white text-[#2D1C13] border border-[#857C72] text-xs font-medium tracking-wider uppercase whitespace-nowrap flex-shrink-0">配饰</button>
            <button class="px-6 py-2 bg-white text-[#2D1C13] border border-[#857C72] text-xs font-medium tracking-wider uppercase whitespace-nowrap flex-shrink-0">下装</button>
            <button class="px-6 py-2 bg-white text-[#2D1C13] border border-[#857C72] text-xs font-medium tracking-wider uppercase whitespace-nowrap flex-shrink-0">全部</button>
        </div>
    </section>

    <!-- 精选推荐 -->
    <section class="mt-6 px-4 pb-6">
        <div class="flex items-center justify-between mb-4">
            <h2 class="text-base vintage-title tracking-wider uppercase">精选商品</h2>
            <span class="text-xs text-[#2D1C13] font-normal tracking-wider uppercase">更多 <i class="fas fa-chevron-right text-[10px] ml-1"></i></span>
        </div>
        <div class="grid grid-cols-2 gap-4">
            <div class="card-shadow card-shadow-hover overflow-hidden">
                <div class="relative h-56 bg-[#351D14]">
                    <img src="https://images.unsplash.com/photo-1552374196-c4e7ffc6e126?w=400&q=80" alt="商品" class="w-full h-full object-cover">
                    <span class="absolute top-3 right-3 vintage-badge">限量</span>
                </div>
                <div class="p-4 bg-white">
                    <p class="text-sm vintage-card-title mb-2">90年代复古夹克</p>
                    <p class="vintage-price">¥299</p>
                </div>
            </div>
            <div class="card-shadow card-shadow-hover overflow-hidden">
                <div class="relative h-56 bg-[#351D14]">
                    <img src="https://images.unsplash.com/photo-1594633312681-425c7b97ccd1?w=400&q=80" alt="商品" class="w-full h-full object-cover">
                </div>
                <div class="p-4 bg-white">
                    <p class="text-sm vintage-card-title mb-2">经典格纹衬衫</p>
                    <p class="vintage-price">¥189</p>
                </div>
            </div>
            <div class="card-shadow card-shadow-hover overflow-hidden">
                <div class="relative h-56 bg-[#351D14]">
                    <img src="https://images.unsplash.com/photo-1551028719-00167b16eac5?w=400&q=80" alt="商品" class="w-full h-full object-cover">
                </div>
                <div class="p-4 bg-white">
                    <p class="text-sm vintage-card-title mb-2">复古牛仔外套</p>
                    <p class="vintage-price">¥359</p>
                </div>
            </div>
            <div class="card-shadow card-shadow-hover overflow-hidden">
                <div class="relative h-56 bg-[#351D14]">
                    <img src="https://images.unsplash.com/photo-1551488831-00ddcb6c6bd3?w=400&q=80" alt="商品" class="w-full h-full object-cover">
                </div>
                <div class="p-4 bg-white">
                    <p class="text-sm vintage-card-title mb-2">vintage皮夹克</p>
                    <p class="vintage-price">¥599</p>
                </div>
            </div>
        </div>
    </section>

    <!-- 底部导航 -->
    <nav class="bottom-nav fixed bottom-0 left-0 right-0 safe-bottom">
        <div class="flex items-center justify-around py-3">
            <div class="flex flex-col items-center">
                <i class="fas fa-home text-[#876635] text-base mb-1"></i>
                <span class="text-[10px] text-[#876635] font-medium tracking-wider uppercase">首页</span>
            </div>
            <div class="flex flex-col items-center">
                <i class="fas fa-th-large text-[#857C72] text-base mb-1"></i>
                <span class="text-[10px] text-[#857C72] tracking-wider uppercase">分类</span>
            </div>
            <div class="flex flex-col items-center">
                <i class="fas fa-shopping-bag text-[#857C72] text-base mb-1"></i>
                <span class="text-[10px] text-[#857C72] tracking-wider uppercase">购物车</span>
            </div>
            <div class="flex flex-col items-center">
                <i class="fas fa-user text-[#857C72] text-base mb-1"></i>
                <span class="text-[10px] text-[#857C72] tracking-wider uppercase">我的</span>
            </div>
        </div>
    </nav>
</body>
</html>
